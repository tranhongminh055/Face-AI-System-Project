    <div id="notification" class="notification"></div> <!-- The notification element for displaying feedback messages to users in the face recognition system. This div is designed to show success or error messages when users interact with the application, such as when capturing images or uploading files. The notification is styled to be visually appealing and easily noticeable, enhancing the overall user experience by providing clear and immediate feedback on user actions within the application. -->

    <script> // JavaScript code for handling camera access, image capture, file uploads, and displaying results in the face recognition system. This script includes functionality for accessing the user's camera, capturing images from the video feed, sending captured images to the server for processing, handling file uploads through a modal interface, and displaying results and notifications to users based on their interactions with the application. The script is designed to enhance the overall user experience by providing clear feedback and intuitive controls for using the face recognition system effectively. -->
        const video = document.getElementById('video'); // Get the video element for displaying the camera feed in the face recognition system. This element is essential for allowing users to see the live feed from their camera and interact with it to capture images for processing. The video element is accessed using its ID, enabling the script to control its behavior and display the camera feed effectively within the application. -->
        const canvas = document.getElementById('canvas'); // Get the canvas element for processing captured images in the face recognition system. This element is used to draw the captured image from the video feed, allowing for further processing such as converting the image to a data URL for sending to the server. The canvas element is accessed using its ID, enabling the script to manipulate it as needed for handling captured images within the application. -->
        const captureButton = document.getElementById('capture'); // Get the capture button element for triggering the capture of images from the camera feed in the face recognition system. This button allows users to take a snapshot of the current frame from the video feed, which is then processed and sent to the server for face recognition. The capture button is accessed using its ID, enabling the script to attach event listeners and handle user interactions effectively within the application. -->
        const resultsDiv = document.getElementById('results'); // Get the results div element for displaying the results of the face recognition process in the face recognition system. This element is used to show feedback to users about the number of faces detected and any relevant information about the recognized faces. The results div is accessed using its ID, allowing the script to update its content dynamically based on the results received from the server, enhancing the overall user experience by providing clear and organized feedback within the application. -->
        const notification = document.getElementById('notification'); // Get the notification element for displaying feedback messages to users in the face recognition system. This element is used to show success or error messages when users interact with the application, such as when capturing images or uploading files. The notification element is accessed using its ID, allowing the script to update its content and style dynamically based on user interactions and system events, enhancing the overall user experience by providing clear and immediate feedback within the application. -->

        const modal = document.getElementById('uploadModal'); // Get the modal element for uploading images in the face recognition system. This element is used to display the interface for users to select and upload image files for processing and face recognition. The modal is accessed using its ID, allowing the script to control its visibility and handle user interactions effectively when opening and closing the modal within the application. -->
        const openModalButton = document.getElementById('openModal'); // Get the button element for opening the image upload modal in the face recognition system. This button allows users to access the interface for uploading images for processing and face recognition. The open modal button is accessed using its ID, enabling the script to attach event listeners and handle user interactions effectively when opening the modal within the application. -->
        const closeModalButton = document.getElementById('closeModal');  // Get the close button element for closing the image upload modal in the face recognition system. This button allows users to exit the modal interface when they are finished interacting with it. The close modal button is accessed using its ID, enabling the script to attach event listeners and handle user interactions effectively when closing the modal within the application. -->

        let capturedImageData = null; // Store captured image data

        // Function to show notification
        const showNotification = (message, isError = false) => { // Define a function to display notifications to users in the face recognition system, with parameters for the message content and an optional flag for error messages. This function updates the notification element's text content and style based on the type of message being displayed, providing clear and immediate feedback to users when they interact with the application. The use of a timeout ensures that notifications are automatically hidden after a short duration, enhancing the overall user experience by keeping the interface clean and focused. -->
            notification.textContent = message; // Set the text content of the notification element to the provided message, allowing users to see feedback related to their interactions with the face recognition system. This dynamic update of the notification content helps to enhance the overall user experience by providing clear and relevant information in response to user actions within the application. -->
            notification.className = isError ? 'notification error' : 'notification'; // Update the class name of the notification element based on whether the message is an error or not, allowing for different styling of success and error notifications in the face recognition system. This conditional styling helps to differentiate between positive and negative feedback, making it easier for users to quickly identify the nature of the message being displayed and enhancing the overall user experience by providing clear visual cues within the application. -->
            notification.style.display = 'block'; // Set the display style of the notification element to 'block' to make it visible on the page, allowing users to see the feedback message when it is triggered in the face recognition system. This change in visibility is essential for providing immediate feedback to users based on their interactions with the application, enhancing the overall user experience by ensuring that notifications are easily noticeable and accessible when they are displayed. -->
            setTimeout(() => { // Use a timeout to automatically hide the notification after a short duration, improving the user experience by keeping the interface clean and focused in the face recognition system. This allows users to receive feedback without having to manually dismiss notifications, enhancing the overall usability of the application. -->
                notification.style.display = 'none'; // Set the display style of the notification element back to 'none' after the timeout, hiding it from view and allowing users to focus on other interactions within the face recognition system. This automatic hiding of notifications helps to maintain a clean and organized interface, enhancing the overall user experience by preventing clutter and ensuring that notifications are only visible when relevant. -->
            }, 3000); // Set the duration for which the notification is displayed (in milliseconds), allowing users to have enough time to read the message before it is automatically hidden in the face recognition system. This duration can be adjusted as needed to provide an optimal user experience based on the typical length of messages and user reading speed within the application. -->
        }; 

        // Access the device camera and stream to video element
        navigator.mediaDevices.getUserMedia({ video: true }) // Use the getUserMedia API to request access to the user's camera and stream the video feed to the video element in the face recognition system. This allows users to see the live feed from their camera and interact with it to capture images for processing. The use of promises allows for handling success and error cases effectively, providing feedback to users if there are issues accessing the camera and enhancing the overall user experience within the application. -->
            .then((stream) => { // Handle successful access to the camera by setting the video element's source object to the obtained media stream, allowing the live camera feed to be displayed in the face recognition system. This enables users to see themselves on the screen and interact with the video feed to capture images for processing, enhancing the overall functionality and user experience of the application. -->
                video.srcObject = stream; // Set the source object of the video element to the obtained media stream, allowing the live camera feed to be displayed in the face recognition system. This is essential for enabling users to see themselves on the screen and interact with the video feed to capture images for processing, enhancing the overall functionality and user experience of the application. -->
            })
            .catch((err) => { // Handle errors that occur when trying to access the camera, such as permission issues or hardware problems, by logging the error and showing a notification to users in the face recognition system. This provides clear feedback to users about the issue and helps to enhance the overall user experience by informing them of any problems that may prevent them from using the camera functionality within the application. -->
                console.error("Error accessing the camera: ", err); // Log the error to the console for debugging purposes, allowing developers to understand and address issues related to camera access in the face recognition system. This information can be valuable for troubleshooting and improving the application, enhancing the overall user experience by ensuring that camera-related issues are identified and resolved effectively. -->
                showNotification("Error accessing the camera.", true); // Show a notification to users indicating that there was an error accessing the camera, providing clear feedback about the issue in the face recognition system. This helps to enhance the overall user experience by informing users of any problems that may prevent them from using the camera functionality within the application, allowing them to take appropriate action or seek assistance if needed. -->
            });

        // Capture the current frame from the video
        captureButton.addEventListener('click', () => { // Add an event listener to the capture button that triggers the capture of the current frame from the video feed when clicked in the face recognition system. This allows users to take a snapshot of themselves or their surroundings for processing and face recognition, enhancing the overall functionality and user experience of the application. The event listener handles the process of capturing the image, converting it to a data URL, and sending it to the server for analysis, providing a seamless and interactive experience for users when using the camera feature within the application. -->
            const context = canvas.getContext('2d'); // Get the 2D drawing context of the canvas element, allowing for drawing and manipulation of images in the face recognition system. This context is essential for processing captured images from the video feed, enabling the application to draw the current frame onto the canvas and convert it to a data URL for sending to the server. The use of the canvas element and its context enhances the overall functionality of the application by providing a way to handle image processing directly within the browser, improving performance and user experience when capturing and analyzing images for face recognition. -->
            canvas.width = video.videoWidth; // Set the width of the canvas to match the width of the video feed, ensuring that the captured image is drawn at the correct dimensions in the face recognition system. This is important for maintaining the quality and accuracy of the captured image when it is processed and sent to the server for analysis, enhancing the overall user experience by providing clear and accurate results from the face recognition process. -->
            canvas.height = video.videoHeight; // Set the height of the canvas to match the height of the video feed, ensuring that the captured image is drawn at the correct dimensions in the face recognition system. This is important for maintaining the quality and accuracy of the captured image when it is processed and sent to the server for analysis, enhancing the overall user experience by providing clear and accurate results from the face recognition process. -->
            context.drawImage(video, 0, 0, canvas.width, canvas.height); // Draw the current frame from the video feed onto the canvas, allowing for further processing of the captured image in the face recognition system. This step is essential for converting the live video feed into a static image that can be analyzed and sent to the server for face recognition, enhancing the overall functionality and user experience of the application by providing a seamless way to capture and process images directly from the camera feed. -->

            // Convert the image to a data URL and send it immediately
            capturedImageData = canvas.toDataURL('image/jpeg'); // Convert the drawn image on the canvas to a data URL in JPEG format, allowing it to be easily sent to the server for processing in the face recognition system. This conversion is essential for transmitting the captured image as a string of data that can be handled by the server, enabling the application to analyze the image for face recognition and provide results back to the user, enhancing the overall functionality and user experience of the application. -->
            showNotification("Processing captured image..."); // Show a notification to users indicating that the captured image is being processed, providing clear feedback about the ongoing action in the face recognition system. This helps to enhance the overall user experience by keeping users informed about the status of their interactions with the application, allowing them to understand that their captured image is being analyzed and that results will be provided shortly. -->
            console.log('Image captured. Sending to server...'); // Log a message to the console indicating that the image has been captured and is being sent to the server, providing useful information for debugging and understanding the flow of actions in the face recognition system. This log can help developers track the process of capturing and sending images, enhancing the overall development and maintenance of the application by providing insights into user interactions and system behavior. -->

            // Send to server immediately
            fetch('/capture', { // Use the Fetch API to send the captured image data to the server for processing in the face recognition system. This allows the application to analyze the captured image for face recognition and provide results back to the user, enhancing the overall functionality and user experience of the application. The use of promises allows for handling success and error cases effectively, providing feedback to users based on the results received from the server and ensuring a smooth interaction with the application. -->
                method: 'POST', // Set the HTTP method to POST for sending data to the server in the face recognition system. This indicates that the request is intended to submit data (the captured image) for processing, allowing the server to handle it appropriately and return results based on the analysis of the image. The choice of POST is essential for ensuring that the data is transmitted securely and efficiently, enhancing the overall functionality and user experience of the application when interacting with the camera feature. -->
                headers: { // Set the headers for the fetch request, including the Content-Type to indicate that the body of the request contains JSON data in the face recognition system. This is important for ensuring that the server can correctly interpret the incoming data and process it accordingly, enhancing the overall functionality and user experience of the application by facilitating effective communication between the client and server when handling captured images for face recognition. -->
                    'Content-Type': 'application/json', // Set the Content-Type header to 'application/json' to indicate that the body of the request contains JSON data, allowing the server to correctly parse and handle the incoming data in the face recognition system. This is essential for ensuring that the captured image data is transmitted in a format that can be easily processed by the server, enhancing the overall functionality and user experience of the application when interacting with the camera feature. -->
                },
                body: JSON.stringify({ image: capturedImageData }), // Set the body of the fetch request to a JSON string containing the captured image data, allowing it to be sent to the server for processing in the face recognition system. This structured format enables the server to easily extract and analyze the image data for face recognition, enhancing the overall functionality and user experience of the application by providing a seamless way to transmit captured images from the client to the server for analysis. -->
            })
            .then((response) => response.json()) // Handle the response from the server by parsing it as JSON, allowing the application to process the results of the face recognition analysis in the face recognition system. This step is essential for interpreting the data returned by the server and providing meaningful feedback to users based on the results of their interactions with the application, enhancing the overall user experience by delivering clear and relevant information about the face recognition process. -->
            .then((data) => { // Handle the parsed data from the server, which contains the results of the face recognition analysis, and provide feedback to users in the face recognition system. This includes checking for errors, displaying the number of faces detected, and showing detailed results if available. The handling of this data is crucial for providing a meaningful and informative user experience, allowing users to understand the outcomes of their interactions with the application and enhancing the overall functionality of the face recognition system. -->
                console.log('Capture response:', data); // Log the response data from the server for debugging purposes, allowing developers to understand the results of the face recognition analysis and identify any issues that may arise in the face recognition system. This information can be valuable for troubleshooting and improving the application, enhancing the overall user experience by ensuring that server responses are properly handled and interpreted within the application. -->
                if (data.error) { // Check if the response contains an error and show an error notification to users in the face recognition system, providing clear feedback about any issues that occurred during the processing of the captured image. This helps to enhance the overall user experience by informing users of problems that may prevent successful face recognition, allowing them to take appropriate action or seek assistance if needed. The logging of the error also aids developers in understanding and addressing issues within the application. -->
                    showNotification(`Error: ${data.error}`, true); // Show an error notification to users with the error message from the server, providing clear feedback about any issues that occurred during the processing of the captured image in the face recognition system. This helps to enhance the overall user experience by informing users of problems that may prevent successful face recognition, allowing them to take appropriate action or seek assistance if needed. The use of a notification ensures that users receive immediate and visible feedback about errors, improving the usability of the application when issues arise. -->
                    console.error(' Capture error:', data.error); // Log the error message from the server to the console for debugging purposes, allowing developers to understand and address issues related to the processing of captured images in the face recognition system. This information can be valuable for troubleshooting and improving the application, enhancing the overall user experience by ensuring that errors are properly handled and resolved within the application. -->
                } else { // If there are no errors, check the results and show appropriate notifications to users in the face recognition system. This includes checking if any faces were detected and providing feedback on the number of faces found, as well as displaying detailed results if available. This handling of results is crucial for providing a meaningful and informative user experience, allowing users to understand the outcomes of their interactions with the application and enhancing the overall functionality of the face recognition system. -->
                    if (data.results && data.results.length === 0) { // Check if the results indicate that no faces were found and show a notification to users in the face recognition system, providing clear feedback about the outcome of their interaction. This helps to enhance the overall user experience by informing users of the results of their actions, allowing them to understand that no faces were detected in the captured image and encouraging them to try again or adjust their approach for better results. The logging of this outcome also aids developers in understanding user interactions and improving the application based on user feedback. -->
                        showNotification(" No faces found", true); // Show a notification to users indicating that no faces were found in the captured image, providing clear feedback about the outcome of their interaction in the face recognition system. This helps to enhance the overall user experience by informing users of the results of their actions, allowing them to understand that no faces were detected and encouraging them to try again or adjust their approach for better results. The use of a notification ensures that users receive immediate and visible feedback about the outcome, improving the usability of the application when no faces are detected. -->
                        console.warn(' No faces detected in captured image'); // Log a warning message to the console indicating that no faces were detected in the captured image, providing useful information for debugging and understanding user interactions in the face recognition system. This information can help developers track the effectiveness of the face recognition process and identify any issues that may arise when users capture images, enhancing the overall development and maintenance of the application by providing insights into user interactions and system behavior. -->
                    } else { // If faces are detected, show a notification with the number of faces found and log the results in the face recognition system. This provides clear feedback to users about the success of their interaction and allows them to see detailed information about the recognized faces if available. The handling of this outcome is crucial for providing a meaningful and informative user experience, allowing users to understand the results of their interactions with the application and enhancing the overall functionality of the face recognition system. -->
                        showNotification(` Found ${data.results.length} face(s)`); // Show a notification to users indicating the number of faces found in the captured image, providing clear feedback about the success of their interaction in the face recognition system. This helps to enhance the overall user experience by informing users of the results of their actions, allowing them to understand that faces were detected and encouraging them to view the detailed results for more information. The use of a notification ensures that users receive immediate and visible feedback about the outcome, improving the usability of the application when faces are detected. -->
                        console.log('✓ Faces detected:', data.results.length, 'face(s)'); // Log a message to the console indicating the number of faces detected in the captured image, providing useful information for debugging and understanding user interactions in the face recognition system. This information can help developers track the effectiveness of the face recognition process and identify any issues that may arise when users capture images, enhancing the overall development and maintenance of the application by providing insights into user interactions and system behavior. -->
                        if (data.results) { // If there are results, display them in the results div in the face recognition system, providing users with detailed information about the recognized faces. This allows users to see the outcomes of their interactions with the application and understand the details of the face recognition process, enhancing the overall user experience by providing clear and organized feedback within the application. The use of JSON.stringify allows for a readable format of the results, making it easier for users to interpret the information provided. -->
                            resultsDiv.innerHTML = `<p style='color: green;'>✓ Found ${data.results.length} face(s)</p><pre>${JSON.stringify(data.results, null, 2)}</pre>`; // Update the inner HTML of the results div to display the number of faces found and the detailed results in a readable format, providing users with clear and organized feedback about the outcomes of their interactions with the face recognition system. This enhances the overall user experience by allowing users to understand the results of their actions and see detailed information about the recognized faces, improving the usability and functionality of the application when displaying results from face recognition analysis. -->
                        }
                    }
                }

            .catch((error) => { // Handle any errors that occur during the fetch request, such as network issues or server errors, by logging the error and showing a notification to users in the face recognition system. This provides clear feedback about any problems that may prevent successful communication with the server, allowing users to understand that an unexpected error occurred and encouraging them to try again or seek assistance if needed. The logging of the error also aids developers in understanding and addressing issues within the application, enhancing the overall user experience by ensuring that errors are properly handled and resolved within the application. -->

                showNotification("An unexpected error occurred.", true); // Show a notification to users indicating that an unexpected error occurred during the fetch request, providing clear feedback about any problems that may prevent successful communication with the server in the face recognition system. This helps to enhance the overall user experience by informing users of issues that may arise when interacting with the application, allowing them to understand that an error occurred and encouraging them to try again or seek assistance if needed. The use of a notification ensures that users receive immediate and visible feedback about errors, improving the usability of the application when issues arise during server communication. -->
            });
        });

        // Handle file upload form submission
        const uploadForm = document.getElementById('uploadForm'); // Get the upload form element for handling file uploads in the face recognition system. This form allows users to select and submit image files for processing and face recognition, providing an alternative method for users to interact with the application beyond capturing images from the camera feed. The upload form is accessed using its ID, enabling the script to attach event listeners and handle user interactions effectively when submitting files for processing within the application. -->

                return; // Exit the event
            }
